<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="420" viewBox="0 0 1200 420"
     role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">DubFlow - 视频翻译与中文配音工作台</title>
  <desc id="hero-desc">以字幕时间轴、双语校对和音频波形展示 DubFlow 从内容输入到配音导出的工作流。</desc>

  <defs>
    <clipPath id="canvas-clip">
      <rect width="1200" height="420" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#canvas-clip)">
    <rect width="1200" height="420" fill="#111311"/>
    <rect x="0" y="0" width="16" height="420" fill="#2DD4BF"/>
    <rect x="16" y="0" width="5" height="420" fill="#FF7A59"/>

    <g id="title-block" transform="translate(72 58)">
      <text x="0" y="0"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="16" font-weight="700" fill="#2DD4BF">LOCAL VIDEO DUBBING WORKSPACE</text>

      <text x="0" y="82"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
            font-size="68" font-weight="800" fill="#F5F2EA">DubFlow</text>

      <text x="0" y="130"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
            font-size="24" font-weight="650" fill="#F5F2EA">从字幕到中文配音，一条工作流完成</text>

      <text x="0" y="170"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
            font-size="17" fill="#A8AEA8">识别 · 翻译 · 校对 · 音色 · 导出</text>

      <g transform="translate(0 214)">
        <rect width="132" height="42" rx="8" fill="#1C211E" stroke="#343A35"/>
        <circle cx="22" cy="21" r="7" fill="#2DD4BF"/>
        <text x="40" y="27"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="16" fill="#E7EAE5">AUDIO / VIDEO</text>

        <rect x="144" width="88" height="42" rx="8" fill="#1C211E" stroke="#343A35"/>
        <rect x="163" y="14" width="15" height="14" rx="2" fill="#FF7A59"/>
        <text x="188" y="27"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="16" fill="#E7EAE5">SRT</text>

        <rect x="244" width="124" height="42" rx="8" fill="#1C211E" stroke="#343A35"/>
        <path d="M264 13 L264 29 L279 21 Z" fill="#F7C948"/>
        <text x="290" y="27"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="16" fill="#E7EAE5">YOUTUBE</text>
      </g>
    </g>

    <g id="subtitle-workspace" transform="translate(596 44)">
      <rect width="548" height="286" rx="16" fill="#F5F2EA"/>

      <g transform="translate(24 22)">
        <circle cx="7" cy="7" r="7" fill="#FF7A59"/>
        <circle cx="31" cy="7" r="7" fill="#F7C948"/>
        <circle cx="55" cy="7" r="7" fill="#2DD4BF"/>
        <text x="500" y="13" text-anchor="end"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="15" font-weight="700" fill="#676D68">SUBTITLE EDITOR</text>
      </g>

      <line x1="24" y1="54" x2="524" y2="54" stroke="#D7D8D2"/>

      <g transform="translate(24 72)">
        <rect width="500" height="82" rx="10" fill="#FFFFFF" stroke="#D7D8D2"/>
        <text x="16" y="25"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="15" font-weight="700" fill="#167D72">00:12.40 → 00:15.82</text>
        <text x="16" y="52"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="18" fill="#383D39">Build one line at a time.</text>
        <text x="252" y="52"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
              font-size="18" font-weight="650" fill="#111311">逐行打磨，让表达自然落地。</text>
        <path d="M226 42 L240 42 M234 36 L240 42 L234 48" fill="none" stroke="#FF7A59" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <g transform="translate(24 168)">
        <rect width="500" height="92" rx="10" fill="#1C211E"/>
        <circle cx="28" cy="46" r="18" fill="#2DD4BF"/>
        <path d="M23 37 L23 55 L37 46 Z" fill="#111311"/>

        <g transform="translate(64 19)" fill="#FF7A59">
          <rect x="0" y="20" width="5" height="14" rx="2"/>
          <rect x="12" y="12" width="5" height="30" rx="2"/>
          <rect x="24" y="5" width="5" height="44" rx="2"/>
          <rect x="36" y="16" width="5" height="22" rx="2"/>
          <rect x="48" y="9" width="5" height="36" rx="2"/>
          <rect x="60" y="18" width="5" height="18" rx="2"/>
          <rect x="72" y="2" width="5" height="50" rx="2"/>
          <rect x="84" y="13" width="5" height="28" rx="2"/>
          <rect x="96" y="7" width="5" height="40" rx="2"/>
          <rect x="108" y="20" width="5" height="14" rx="2"/>
          <rect x="120" y="11" width="5" height="32" rx="2"/>
          <rect x="132" y="17" width="5" height="20" rx="2"/>
          <rect x="144" y="4" width="5" height="46" rx="2"/>
          <rect x="156" y="14" width="5" height="26" rx="2"/>
          <rect x="168" y="9" width="5" height="36" rx="2"/>
          <rect x="180" y="19" width="5" height="16" rx="2"/>
          <rect x="192" y="12" width="5" height="30" rx="2"/>
          <rect x="204" y="6" width="5" height="42" rx="2"/>
          <rect x="216" y="16" width="5" height="22" rx="2"/>
          <rect x="228" y="10" width="5" height="34" rx="2"/>
        </g>

        <text x="320" y="39"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="15" fill="#A8AEA8">VOICE PREVIEW</text>
        <text x="320" y="64"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
              font-size="17" font-weight="700" fill="#F5F2EA">中文配音已就绪</text>
      </g>
    </g>

    <g id="workflow-line" transform="translate(596 354)">
      <line x1="10" y1="12" x2="524" y2="12" stroke="#343A35" stroke-width="2"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">
        <circle cx="10" cy="12" r="8" fill="#2DD4BF"/>
        <text x="10" y="42" text-anchor="middle" fill="#A8AEA8">INPUT</text>

        <circle cx="140" cy="12" r="8" fill="#F7C948"/>
        <text x="140" y="42" text-anchor="middle" fill="#A8AEA8">CAPTION</text>

        <circle cx="268" cy="12" r="8" fill="#FF7A59"/>
        <text x="268" y="42" text-anchor="middle" fill="#A8AEA8">TRANSLATE</text>

        <circle cx="398" cy="12" r="8" fill="#2DD4BF"/>
        <text x="398" y="42" text-anchor="middle" fill="#A8AEA8">VOICE</text>

        <circle cx="524" cy="12" r="8" fill="#F5F2EA"/>
        <text x="524" y="42" text-anchor="middle" fill="#A8AEA8">EXPORT</text>
      </g>
    </g>
  </g>
</svg>
